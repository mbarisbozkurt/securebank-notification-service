spring.application.name=securebank-notification-service

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:0}
spring.flyway.table=${FLYWAY_TABLE:flyway_schema_history_notification}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:securebank}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

securebank.rabbitmq.exchange=${RABBITMQ_EVENTS_EXCHANGE:securebank.events}
securebank.rabbitmq.dead-letter-exchange=${RABBITMQ_EVENTS_DEAD_LETTER_EXCHANGE:securebank.events.dlx}
securebank.rabbitmq.transfer-completed-queue=${RABBITMQ_TRANSFER_COMPLETED_QUEUE:securebank.transfer.completed}
securebank.rabbitmq.transfer-completed-dead-letter-queue=${RABBITMQ_TRANSFER_COMPLETED_DEAD_LETTER_QUEUE:securebank.transfer.completed.dlq}
securebank.rabbitmq.transfer-completed-routing-key=${RABBITMQ_TRANSFER_COMPLETED_ROUTING_KEY:transfer.completed}
securebank.rabbitmq.transfer-completed-dead-letter-routing-key=${RABBITMQ_TRANSFER_COMPLETED_DEAD_LETTER_ROUTING_KEY:transfer.completed.dlq}
securebank.rabbitmq.declare-on-startup=${RABBITMQ_DECLARE_ON_STARTUP:true}
securebank.rabbitmq.listener-auto-startup=${RABBITMQ_LISTENER_AUTO_STARTUP:true}
securebank.rabbitmq.retry.max-attempts=${RABBITMQ_RETRY_MAX_ATTEMPTS:3}
securebank.rabbitmq.retry.initial-interval-ms=${RABBITMQ_RETRY_INITIAL_INTERVAL_MS:2000}
securebank.rabbitmq.retry.multiplier=${RABBITMQ_RETRY_MULTIPLIER:2.0}
securebank.rabbitmq.retry.max-interval-ms=${RABBITMQ_RETRY_MAX_INTERVAL_MS:10000}

securebank.email.from=${MAIL_FROM:no-reply@securebank.local}
securebank.email.sender-mode=${MAIL_SENDER_MODE:logging}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
