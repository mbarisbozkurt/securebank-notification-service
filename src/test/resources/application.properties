spring.rabbitmq.listener.simple.auto-startup=false

spring.datasource.url=jdbc:h2:mem:securebank-notification-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.enabled=false

securebank.rabbitmq.exchange=securebank.events
securebank.rabbitmq.transfer-completed-queue=securebank.transfer.completed
securebank.rabbitmq.transfer-completed-routing-key=transfer.completed
securebank.rabbitmq.declare-on-startup=false
securebank.rabbitmq.listener-auto-startup=false
